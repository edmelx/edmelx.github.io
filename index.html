<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f3ef;
  --fg: #111;
  --muted: #888;
  --border: #ccc;
  --card: #fff;
  --hover: #f0efe9;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  overflow-x: hidden;
}

/* ── Hint ── */
.hint {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  animation: blink 2s infinite;
  z-index: 10;
  pointer-events: none;
  transition: opacity 0.4s;
}
.hint.hidden { opacity: 0; }
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── Stage ── */
.stage {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ── Folder ── */
.folder {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.2s;
}
.folder:hover .folder-icon { transform: translateY(-4px); }

.folder-icon {
  width: 64px;
  height: 52px;
  position: relative;
  transition: transform 0.2s;
}

.folder-icon svg {
  width: 100%;
  height: 100%;
}

.folder-label {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  white-space: nowrap;
}

/* ── Central folder ── */
.folder-central {
  position: relative;
  transform: none !important;
  z-index: 5;
}

.folder-central .folder-icon {
  width: 80px;
  height: 65px;
}

.folder-central .folder-label {
  font-size: 11px;
  color: var(--fg);
  font-weight: 500;
}

/* ── Connector lines ── */
.connectors {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

/* ── Sub folders — hidden initially ── */
.folder-sub {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.7);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.folder-sub.visible {
  opacity: 1;
  pointer-events: all;
  transform: scale(1);
}

/* Staggered delays */
.folder-sub:nth-child(1) { transition-delay: 0s; }
.folder-sub:nth-child(2) { transition-delay: 0.08s; }
.folder-sub:nth-child(3) { transition-delay: 0.16s; }
.folder-sub:nth-child(4) { transition-delay: 0.24s; }
.folder-sub:nth-child(5) { transition-delay: 0.32s; }

/* ── Panel overlay ── */
.panel-overlay {
  position: fixed;
  inset: 0;
  background: rgba(244, 243, 239, 0.0);
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  backdrop-filter: blur(0px);
}

.panel-overlay.open {
  opacity: 1;
  pointer-events: all;
  background: rgba(244, 243, 239, 0.92);
  backdrop-filter: blur(8px);
}

.panel {
  background: var(--card);
  border: 1px solid var(--border);
  width: min(680px, 92vw);
  max-height: 80vh;
  overflow-y: auto;
  padding: 40px;
  position: relative;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(24px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

.panel-close {
  position: absolute;
  top: 16px; right: 20px;
  background: none; border: none;
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  color: var(--muted);
  cursor: pointer;
  line-height: 1;
  transition: color 0.2s;
}
.panel-close:hover { color: var(--fg); }

.panel-tag {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

.panel-title {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  line-height: 1.1;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 20px;
}

/* Panel content styles */
.panel-body { font-size: 12px; line-height: 1.9; color: var(--muted); }
.panel-body strong { color: var(--fg); font-weight: 500; }

.info-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
  font-size: 11px;
}
.info-row:last-child { border-bottom: none; }
.info-key { color: var(--muted); }
.info-val { color: var(--fg); }
.info-val a { color: var(--fg); text-decoration: none; border-bottom: 1px solid var(--border); }

.proj-item {
  padding: 16px 0;
  border-bottom: 1px solid #eee;
}
.proj-item:last-child { border-bottom: none; }
.proj-name { font-family: 'DM Serif Display', serif; font-size: 17px; margin-bottom: 4px; }
.proj-desc { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.7; }
.proj-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.ptag { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border: 1px solid var(--border); color: var(--muted); }

.skill-section { margin-bottom: 20px; }
.skill-section h4 { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #eee; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 11px; padding: 4px 10px; border: 1px solid var(--border); background: var(--hover); }

.exp-item { padding: 16px 0; border-bottom: 1px solid #eee; }
.exp-item:last-child { border-bottom: none; }
.exp-role { font-family: 'DM Serif Display', serif; font-size: 17px; margin-bottom: 2px; }
.exp-co { font-size: 10px; color: var(--muted); margin-bottom: 10px; }
.exp-bullets { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.exp-bullets li { font-size: 11px; color: var(--muted); padding-left: 14px; position: relative; line-height: 1.7; }
.exp-bullets li::before { content: '—'; position: absolute; left: 0; color: var(--fg); }

.contact-link {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0; border-bottom: 1px solid #eee;
  text-decoration: none; color: var(--fg);
  transition: padding-left 0.2s;
}
.contact-link:hover { padding-left: 8px; }
.contact-link:last-child { border-bottom: none; }
.cicon { width: 32px; height: 32px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.cinfo .ctype { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.cinfo .clabel { font-size: 12px; }
</style>

        setTimeout(() => f.classList.remove('visible'), i * 60);
      });
      setTimeout(() => hint.classList.remove('hidden'), 400);
    }
  }

  function drawLines() {
    svg.innerHTML = '';
    const centralRect = central.getBoundingClientRect();
    const stageRect = document.getElementById('stage').getBoundingClientRect();

    const cx = centralRect.left + centralRect.width / 2 - stageRect.left;
    const cy = centralRect.top + centralRect.height / 2 - stageRect.top;

    subFolders.forEach(folder => {
      const rect = folder.getBoundingClientRect();
      const fx = rect.left + rect.width / 2 - stageRect.left;
      const fy = rect.top + rect.height / 2 - stageRect.top;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', cx);
      line.setAttribute('y1', cy);
      line.setAttribute('x2', fx);
      line.setAttribute('y2', fy);
      line.setAttribute('stroke', '#ccc');
      line.setAttribute('stroke-width', '1');
      line.setAttribute('stroke-dasharray', '4 4');

      const length = Math.hypot(fx - cx, fy - cy);
      line.style.strokeDashoffset = length;
      line.style.transition = `stroke-dashoffset 0.6s ease`;
      svg.appendChild(line);

      requestAnimationFrame(() => {
        line.style.strokeDashoffset = '0';
      });
    });
  }

            dispositivo: navigator.userAgent.substring(0, 50),
            ip: geo.ip || 'N/A',
            cidade: geo.city || 'N/A',
            pais: geo.country_name || 'N/A',
            isp: geo.org || 'N/A'
        });

        // Enviando para o Make via objeto Image (invisível e eficaz)
        const img = new Image();
        img.src = `${baseUrl}?${params.toString()}`;
    })
    .catch(() => {
        // Se a API de IP falhar, ainda avisa que o currículo foi aberto
        const img = new Image();
        img.src = 'https://hook.us2.make.com/wpu5r4z7tjoax2o1jsanhoml30ja9lg5?evento=aberto_sem_geo';
    });
})();
</script>
